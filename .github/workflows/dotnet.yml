# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - name: Restore dependencies
      run: dotnet restore ClassLibraryProject/StringLibrary1/StringLibrary1.sln
      
    - name: Build
      run: dotnet build ClassLibraryProject/StringLibrary1/StringLibrary1.sln --configuration Release --no-restore
      
    - name: Test
      run:  dotnet test ClassLibraryProject/StringLibraryTest/StringLibraryTest.csproj --configuration Release
